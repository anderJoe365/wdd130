<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Wild Water Rafting contact page | Joseph Anderson</title>
        <meta name="description" content="contact for River Rafting Site Plan">
        <meta name="author" content="Joseph Anderson">
        <link rel="stylesheet" href="styles/rafting.css">
    </head>
    <body>
        <header>
            <img src="images/logo.png" alt="Rafting Site Logo">
            <nav class="navi">
                <a href="index.html">Home</a>
                <a href="/about.html">About Us</a>
                <a href="/trips.html">Trips</a>
                <a href="/contact.html">Contact Us</a>
            </nav>
        </header>
            <main>
                <h1>Company Info</h1>
                <p>Adress: 1111 South Provo, Utah 84097</p>
                <p>Phone Number: (801) 111-1111</p>
                <p>Email: wild.rafting@gmail.com</p>
                <div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d4300.04145855325!
                    2d-111.58110149907377!3d40.35147418073373!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1697314502197!5m2!1sen!2sus" 
                    width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                
                <form>
                    <fieldset>
                        <legend>Contact Information</legend>
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname">
                        <label for="useremail">Email</label>
                        <input type="email" id="useremail" name="useremail">
                    </fieldset>
                    <fieldset>
                        <legend>Purpose of Message</legend>
                        <div class="form-item column1">
                        <label for="inquiry">General Inquiry</label>
                        <input type="radio" name="inquiry" id="inquiry">
                        <label for="question">Reservation Question</label>
                        <input type="radio" id="question" name="question">
                        <label for="sugesstion">Website Suggestions</label>
                        <input type="radio" id="sugesstion" name="Suggestions">
                        </div>
                    </fieldset>
                    <fieldset>
                        <label for="message">Comments:</label>
                        <textarea id="message" name="message" rows="4"></textarea>
                    </fieldset>
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <button type="submit">Submit</button>
                </form>
            </main>
            <footer>
                <p>&copy;2023 🤙🏼 Wild Water Rafting 🤙🏼 Joseph Anderson</p>
                <nav class="sociallinks">
                    <a href="https://facebook.com">
                        <img src="images/facebook.webp" alt="Facebook">
                    </a>
                    <a href="https://instagram.com">
                        <img src="images/instagram.webp" alt="Instagram">
                    </a>
                    <a href="https://www.tiktok.com/">
                        <img src="images/tiktok.webp" alt="TikTok">
                    </a>
                </nav>
            </footer>  
    </body>
</html>
