<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>WDD 130 | Quiz Form</title>
        <link rel="stylesheet" href="styles/quiz.css">
    </head>
    <body>
        <header>
            <h1>HTML and CSS Quiz</h1>
        </header>
        <main>
            <form>
            <fieldset>
                <label for="q1">1. What does HTML stand for? </label>
                <input type="text" id="q1" name="q1">

                <label for="q2">2. What are the anatomy of a HTML element?</label>
                <textarea id="q2" name="q2" rows="4"></textarea>

                <label for="q3">3. What is the css Flexbox shorthand for wrapping a row?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One</option>
                    <option value="flex-direction">flex-direction</option>
                    <option value="flex-wrap">flex-wrap</option>
                    <option value="flex-flow">flex-flow</option>
                    <option value="align-items">align-items</option>
                    <option value="jsutify-content">jsutify-content</option>
                </select>
                <label for="q4">4. What ist the width fo this CSS element?</label>
                <img src="images/code snipet.png" alt="CSS code">
                <input type="number" id="q4" name="q4">
            </fieldset>
            <button type="submit">Submit Quiz</button>
            </form>
        </main>

    </body>
</html>
